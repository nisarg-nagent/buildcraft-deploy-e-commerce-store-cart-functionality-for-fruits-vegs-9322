services:
  postgres:
    image: postgres:16-alpine
    container_name: freshcart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myapp}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  backend:
    build:
      context: ./backend
      target: runtime
    image: freshcart-market-backend:${APP_VERSION:-latest}
    container_name: freshcart-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-myapp}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - '${BACKEND_PORT:-8001}:8001'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8001/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  frontend:
    build:
      context: ./frontend
      target: runtime
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    image: freshcart-market-frontend:${APP_VERSION:-latest}
    container_name: freshcart-frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-3000}:80'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

volumes:
  pgdata:
