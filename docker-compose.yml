services:
  postgres:
    image: postgres:16-alpine
    container_name: freshcart-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d myapp']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    container_name: freshcart-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 8001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://user:password@postgres:5432/myapp
      JWT_SECRET: change-this-to-a-long-random-secret
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: debug
    ports:
      - '8001:8001'
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      - backend-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8001/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: freshcart-frontend-dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8001
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata-dev:
  backend-node-modules:
  frontend-node-modules:
